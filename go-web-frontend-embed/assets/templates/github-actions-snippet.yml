steps:
  - uses: actions/checkout@v4

  - uses: actions/setup-go@v5
    with:
      go-version: "1.24"
      cache: true

  - name: Setup pnpm
    uses: pnpm/action-setup@v4
    with:
      version: 10
      run_install: false

  - uses: actions/setup-node@v4
    with:
      node-version: "20"
      cache: "pnpm"
      cache-dependency-path: ui/pnpm-lock.yaml

  - name: Install frontend deps
    run: pnpm -C ui install --frozen-lockfile

  - name: Test
    run: go test ./... -count=1

  - name: Generate (build+copy UI)
    run: go generate ./...

  - name: Build (embed UI assets)
    run: go build -tags embed ./...
